app = "clapcheeks-ai"
primary_region = "lax"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

# Required secrets (set via: fly secrets set KEY=value)
# ANTHROPIC_API_KEY — from 1Password: op://API-Keys/ANTHROPIC-global/credential
