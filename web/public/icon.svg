<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #000000; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #000000; }
    }
  </style>
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9A427" />
      <stop offset="50%" stop-color="#E8C547" />
      <stop offset="100%" stop-color="#C9A427" />
    </linearGradient>
  </defs>
  <rect class="bg" width="180" height="180" rx="37" />
  <!-- Left cheek — smooth bezier curve -->
  <path fill="url(#gold)"
    d="M90 45
       C85 48, 72 55, 58 72
       C44 89, 30 100, 30 118
       C30 136, 44 152, 64 152
       C76 152, 84 144, 88 134
       L90 125
       L90 45
       Z"
  />
  <!-- Right cheek — mirror -->
  <path fill="url(#gold)"
    d="M90 45
       C95 48, 108 55, 122 72
       C136 89, 150 100, 150 118
       C150 136, 136 152, 116 152
       C104 152, 96 144, 92 134
       L90 125
       L90 45
       Z"
  />
  <!-- Cleft line -->
  <line x1="90" y1="50" x2="90" y2="150" stroke="#000" stroke-width="3" stroke-linecap="round" opacity="0.5" />
</svg>
